<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gunting Batu Kertas</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="div-btn">
      <button class="btn-emoji js-gunting">
        <img class="img-emoji" src="images/Gunting-emoji.png">
      </button>

      <button class="btn-emoji js-batu">
        <img class="img-emoji" src="images/Batu-emoji.png">
      </button>

      <button class="btn-emoji js-kertas">
        <img class="img-emoji" src="images/Kertas-emoji.png">
      </button>
    </div>


    <h3 class="result">Kamu Menang</h3>

    <div class="move">
      
    </div>

    <h4 class="score"></h4>

    <div class="div-btn-reset">
      <button class="reset-score">Reset Score</button>
      <button class="auto-play">Auto Play</button>
    </div>


  </div>

  <script src="script.js"></script>
</body>

</html>
